<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="LIGHT Game Updates - All versions and releases">
    <meta name="author" content="Lukzxdd">
    <title>LIGHT</title>
    <link rel="stylesheet" href="/Public/CSS/about.C7pInJ8y.css">
    <link rel="shortcut icon" href="/Public/ICO/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <script src="/Public/JS/scripts.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        .font-junicode {
            font-family: 'Crimson Pro', serif;
        }
        .updates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .version-card {
            background-color: var(--zen-subtle);
            border: 1px solid var(--zen-subtle);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
            cursor: pointer;
        }

        .version-card:hover {
            transform: scale(1.02);
            border-color: var(--zen-coral);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .version-card h2 {
            font-family: 'Junicode', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--zen-dark);
        }

        .version-card p {
            font-size: 0.875rem;
            line-height: 1.5;
            opacity: 0.7;
            margin-bottom: 1rem;
            color: var(--zen-dark);
        }

        .version-card .explore-link {
            color: var(--zen-coral);
            font-weight: 700;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            color: var(--zen-dark);
            opacity: 0.7;
        }

        .loader::after {
            content: "Loading versions...";
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            color: var(--zen-dark);
            opacity: 0.7;
        }

        .subtitle-small {
            font-size: 0.875rem;
            opacity: 0.6;
            text-align: center;
            margin-top: 0.5rem;
        }
        body {
            animation: fadeInPage 0.5s ease-out;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-paper font-['bricolage-grotesque'] text-dark">

    <nav class="container relative z-20 flex w-full items-center justify-between bg-paper py-3 lg:py-6">
        <a class="flex items-center gap-2 text-lg font-bold" href="/">
            <img src="/Public/IMG/studio-logo-without.png" width="60" height="60" alt="Logo">
        </a>
        
        <div class="hidden items-center gap-6 place-self-center text-ls sm:text-sm lg:flex lg:text-base" style="font-size: 1.2rem;">
            <a href="/#about" class="hover:text-coral transition-colors">About</a>
            <a href="/#screenshots" class="hover:text-coral transition-colors">Media</a>
            <a href="/#download" class="hover:text-coral transition-colors">Download</a>
            <a href="/demo/" class="hover:text-coral transition-colors">Demo</a>
            <a href="/updates/" class="hover:text-coral transition-colors">DevLogs</a>
        </div>

        <div class="flex items-center gap-4">
            <a href="https://lukzxdd.itch.io/" target="_blank" class="transition-bg flex items-center justify-center gap-2 rounded-xl border-dark bg-dark px-5 py-3 font-bold text-paper shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-transform">
                Store
                <img src="/Public/IMG/asset 12.svg" width="20px" alt="">
            </a>
        </div>
    </nav>

    <main class="container py-12 lg:py-24">
        <div class="text-center mb-12">
            <h1 class="mb-2 text-4xl font-bold sm:text-6xl">
                RELEASES
            </h1>
            <p class="max-w-xl mx-auto opacity-70 text-lg">
                All versions of LIGHT released up to <span id="current-date" class="text-coral font-semibold"></span>
            </p>
        </div>

        <div class="mb-8">
            <a href="/" class="inline-flex items-center gap-2 text-sm opacity-60 hover:text-coral hover:opacity-100 transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
                Back to Home
            </a>
        </div>

        <div id="version-container" class="updates-grid">
            <div class="loader"></div>
        </div>

        <div class="text-center mt-12 pt-8">
            <p class="text-sm opacity-50">Stay tuned for future updates. The light never dies.</p>
        </div>
    </main>

    <script>
        const repoOwner = 'lukzst';
        const repoName = 'light';
        const targetPath = 'FINAL';

        function setCurrentDate() {
            const dateElement = document.getElementById('current-date');
            if (dateElement) {
                const today = new Date();
                const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
                dateElement.innerText = today.toLocaleDateString('pt-BR', options);
            }
        }

        async function fetchVersions() {
            const container = document.getElementById('version-container');
            if (!container) return;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${targetPath}`);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const data = await response.json();
                
                const folders = data.filter(item => {
                    return item.type === 'dir' && 
                        item.name !== 'BETA_V1.0' && 
                        item.name !== 'V1.0.1' &&
                        item.name !== 'BETA' &&
                        !item.name.includes('BETA');
                });
                
                if (folders.length === 0) {
                    container.innerHTML = '<div class="error-message">No versions found yet. Check back soon!</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                folders.forEach(folder => {
                    const card = document.createElement('a');
                    card.href = `https://github.com/${repoOwner}/${repoName}/tree/main/${targetPath}/${folder.name}`;
                    card.target = "_blank";
                    card.className = 'version-card';
                    card.rel = "noopener noreferrer";
                    
                    card.innerHTML = `
                        <h2 style="font-family: Bricolage Grotesque;">${folder.name.toUpperCase()}</h2>
                        <p>Final build located in the repository. Click to access the files for this version.</p>
                        <div class="explore-link">
                            EXPLORE →
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Error fetching versions:', error);
                container.innerHTML = '<div class="error-message">Unable to load versions. Please try again later.</div>';
            }
        }

        function support() {
            window.location.href = "/support/";
        }
        
        function soundtrack() {
            window.location.href = "/soundtrack/";
        }

        function mudarPagina() {
            document.body.style.animation = 'none';
            document.body.offsetHeight;
            document.body.style.animation = 'fadeInPage 0.5s ease-out';
        }

        document.addEventListener('DOMContentLoaded', () => {
            setCurrentDate();
            fetchVersions();
            
            const observerOptions = {
                threshold: 0.2,
                rootMargin: '0px 0px -50px 0px'
            };

            function animateElements(elements, delayBetween = 150) {
                elements.forEach((el, index) => {
                    setTimeout(() => {
                        el.style.transition = 'opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)';
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                        el.style.filter = 'blur(0px)';
                    }, index * delayBetween);
                });
            }

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const section = entry.target;
                        
                        if (section.id === 'updates-header') {
                            const elements = section.querySelectorAll('h1, p, #current-date');
                            elements.forEach(el => {
                                el.style.opacity = '0';
                                el.style.transform = 'translateY(20px)';
                                el.style.filter = 'blur(4px)';
                            });
                            
                            const elementsArray = Array.from(elements);
                            elementsArray.forEach((el, index) => {
                                const isTitle = el.tagName === 'H1';
                                const delay = isTitle ? 400 + (index * 200) : index * 150;
                                
                                setTimeout(() => {
                                    el.style.transition = 'opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)';
                                    el.style.opacity = '1';
                                    el.style.transform = 'translateY(0)';
                                    el.style.filter = 'blur(0px)';
                                }, delay);
                            });
                        }
                        
                        if (section.id === 'back-link') {
                            const element = section.querySelector('a');
                            if (element) {
                                element.style.opacity = '0';
                                element.style.transform = 'translateY(20px)';
                                element.style.filter = 'blur(4px)';
                                setTimeout(() => {
                                    element.style.transition = 'opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)';
                                    element.style.opacity = '1';
                                    element.style.transform = 'translateY(0)';
                                    element.style.filter = 'blur(0px)';
                                }, 100);
                            }
                        }
                        
                        if (section.id === 'versions-grid') {
                            const cards = section.querySelectorAll('.version-card');
                            if (cards.length > 0) {
                                cards.forEach(card => {
                                    card.style.opacity = '0';
                                    card.style.transform = 'translateY(20px)';
                                    card.style.filter = 'blur(4px)';
                                });
                                
                                const cardsArray = Array.from(cards);
                                cardsArray.forEach((card, index) => {
                                    setTimeout(() => {
                                        card.style.transition = 'opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)';
                                        card.style.opacity = '1';
                                        card.style.transform = 'translateY(0)';
                                        card.style.filter = 'blur(0px)';
                                    }, index * 100);
                                });
                            }
                        }
                        
                        if (section.id === 'updates-footer') {
                            const element = section.querySelector('p');
                            if (element) {
                                element.style.opacity = '0';
                                element.style.transform = 'translateY(20px)';
                                element.style.filter = 'blur(4px)';
                                setTimeout(() => {
                                    element.style.transition = 'opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)';
                                    element.style.opacity = '1';
                                    element.style.transform = 'translateY(0)';
                                    element.style.filter = 'blur(0px)';
                                }, 150);
                            }
                        }
                        
                        observer.unobserve(section);
                    }
                });
            }, observerOptions);

            const updatesHeader = document.querySelector('.text-center.mb-12');
            const backLink = document.querySelector('.mb-8');
            const versionsGrid = document.getElementById('version-container');
            const updatesFooter = document.querySelector('.text-center.mt-12.pt-8');
            
            if (updatesHeader) {
                updatesHeader.id = 'updates-header';
                observer.observe(updatesHeader);
            }
            if (backLink) {
                backLink.id = 'back-link';
                observer.observe(backLink);
            }
            if (versionsGrid) {
                versionsGrid.id = 'versions-grid';
                
                const checkCards = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.addedNodes.length > 0) {
                            const cards = versionsGrid.querySelectorAll('.version-card');
                            if (cards.length > 0 && !versionsGrid.hasAttribute('data-animated')) {
                                versionsGrid.setAttribute('data-animated', 'true');
                                observer.observe(versionsGrid);
                            }
                        }
                    });
                });
                
                checkCards.observe(versionsGrid, { childList: true, subtree: true });
                observer.observe(versionsGrid);
            }
            if (updatesFooter) {
                updatesFooter.id = 'updates-footer';
                observer.observe(updatesFooter);
            }
            
            const style = document.createElement('style');
            style.textContent = `
                #updates-header h1, #updates-header p, #updates-header #current-date,
                #back-link a,
                #versions-grid .version-card,
                #updates-footer p {
                    opacity: 0;
                    transform: translateY(20px);
                    filter: blur(4px);
                    transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), 
                                transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), 
                                filter 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
