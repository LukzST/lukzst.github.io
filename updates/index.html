<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="LIGHT Game Updates - All versions and releases">
    <meta name="author" content="Lukzxdd">
    <title>LIGHT | Updates</title>
    <link rel="stylesheet" href="/Public/CSS/about.C7pInJ8y.css">
    <link rel="shortcut icon" href="/Public/ICO/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <script src="/Public/JS/scripts.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS ESPECÍFICOS PARA UPDATES - USANDO CLASSES ZEN */
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        .font-junicode {
            font-family: 'Crimson Pro', serif;
        }
        .updates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .version-card {
            background-color: var(--zen-subtle);
            border: 1px solid var(--zen-subtle);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
            cursor: pointer;
        }

        .version-card:hover {
            transform: scale(1.02);
            border-color: var(--zen-coral);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .version-card h2 {
            font-family: 'Junicode', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--zen-dark);
        }

        .version-card p {
            font-size: 0.875rem;
            line-height: 1.5;
            opacity: 0.7;
            margin-bottom: 1rem;
            color: var(--zen-dark);
        }

        .version-card .explore-link {
            color: var(--zen-coral);
            font-weight: 700;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            color: var(--zen-dark);
            opacity: 0.7;
        }

        .loader::after {
            content: "Loading versions...";
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            color: var(--zen-dark);
            opacity: 0.7;
        }

        .subtitle-small {
            font-size: 0.875rem;
            opacity: 0.6;
            text-align: center;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-paper font-['bricolage-grotesque'] text-dark">

    <!-- MESMO HEADER DO INDEX -->
    <nav class="container relative z-20 flex w-full items-center justify-between bg-paper py-3 lg:py-6">
        <a class="flex items-center gap-2 text-lg font-bold" href="/">
            <img src="/Public/IMG/studio-logo-without.png" width="50" height="50" alt="Logo">
        </a>
        
        <div class="hidden items-center gap-6 lg:flex text-sm font-semibold uppercase tracking-wider">
            <a href="#about" class="hover:text-coral transition-colors">About</a>
            <a href="#screenshots" class="hover:text-coral transition-colors">Media</a>
            <a href="#download" class="hover:text-coral transition-colors">Download</a>
            <a href="/demo/" class="hover:text-coral transition-colors">Demo</a>
            <a href="/updates/" class="hover:text-coral transition-colors">DevLogs</a>
        </div>

        <div class="flex items-center gap-4">
            <a href="https://lukzxdd.itch.io/" target="_blank" class="flex items-center justify-center gap-2 rounded-xl bg-dark px-6 py-3 text-paper shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-transform">
                Itch.io <img src="/Public/IMG/asset 12.svg" width="20" alt="">
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT - UPDATES -->
    <main class="container py-12 lg:py-24">
        <!-- Cabeçalho -->
        <div class="text-center mb-12">
            <h1 class="font-junicode font-bold text-dark text-5xl md:text-7xl leading-none mb-4">
                RELEASES
            </h1>
            <p class="max-w-xl mx-auto opacity-70 text-lg">
                All versions of LIGHT released up to <span id="current-date" class="text-coral font-semibold"></span>
            </p>
        </div>

        <!-- Botão voltar -->
        <div class="mb-8">
            <a href="/" class="inline-flex items-center gap-2 text-sm opacity-60 hover:text-coral hover:opacity-100 transition-colors">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Home
            </a>
        </div>

        <!-- Container das versões -->
        <div id="version-container" class="updates-grid">
            <div class="loader"></div>
        </div>

        <!-- Mensagem final -->
        <div class="text-center mt-12 pt-8 border-t border-subtle">
            <p class="text-sm opacity-50">Stay tuned for future updates. The light never dies.</p>
        </div>
    </main>

    <script>
        // Configuração do GitHub
        const repoOwner = 'lukzst';
        const repoName = 'light';
        const targetPath = 'FINAL';

        // Função para setar a data atual
        function setCurrentDate() {
            const dateElement = document.getElementById('current-date');
            if (dateElement) {
                const today = new Date();
                const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
                dateElement.innerText = today.toLocaleDateString('pt-BR', options);
            }
        }

        // Função para buscar as versões do GitHub
        async function fetchVersions() {
            const container = document.getElementById('version-container');
            if (!container) return;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${targetPath}`);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const data = await response.json();
                
                // Filtrar apenas pastas (diretórios)
                const folders = data.filter(item => item.type === 'dir');
                
                if (folders.length === 0) {
                    container.innerHTML = '<div class="error-message">No versions found yet. Check back soon!</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                folders.forEach(folder => {
                    const card = document.createElement('a');
                    card.href = `https://github.com/${repoOwner}/${repoName}/tree/main/${targetPath}/${folder.name}`;
                    card.target = "_blank";
                    card.className = 'version-card';
                    card.rel = "noopener noreferrer";
                    
                    card.innerHTML = `
                        <h2>${folder.name.toUpperCase()}</h2>
                        <p>Final build located in the repository. Click to access the files for this version.</p>
                        <div class="explore-link">
                            EXPLORE →
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Error fetching versions:', error);
                container.innerHTML = '<div class="error-message">Unable to load versions. Please try again later.</div>';
            }
        }

        // Funções globais
        function support() {
            window.location.href = "/support/";
        }
        
        function soundtrack() {
            window.location.href = "/soundtrack/";
        }

        // Inicializar quando o DOM estiver carregado
        document.addEventListener('DOMContentLoaded', () => {
            setCurrentDate();
            fetchVersions();
        });
    </script>
</body>
</html>
