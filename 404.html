<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="404 - Page not found. You are lost in the dark.">
    <title>404 | Lost in the Dark</title>
    <link rel="stylesheet" href="/Public/CSS/about.C7pInJ8y.css">
    <link rel="shortcut icon" href="/Public/ICO/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">

    <style>
        /* FONTES ADICIONAIS */
        @font-face {
            font-family: 'Junicode';
            src: url('/Public/fonts/junicode.regular.ttf') format('truetype');
            font-display: swap;
            font-weight: 400;
        }

        @font-face {
            font-family: 'Junicode';
            src: url('/Public/fonts/junicode.bold.ttf') format('truetype');
            font-display: swap;
            font-weight: 700;
        }

        /* ESTILOS ESPECÍFICOS PARA 404 */
        .error-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .code-404 {
            font-family: 'Junicode', serif;
            font-size: clamp(8rem, 25vw, 15rem);
            font-weight: 700;
            color: var(--zen-coral);
            line-height: 1;
            animation: flicker 3s infinite;
            text-shadow: 0 0 30px rgba(247, 111, 83, 0.3);
        }

        .message-404 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-top: -0.5rem;
            margin-bottom: 2rem;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .back-home {
            display: inline-block;
            background-color: var(--zen-dark);
            color: var(--zen-paper);
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.125rem;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: 1rem;
        }

        .back-home:hover {
            transform: scale(1.05);
            background-color: var(--zen-coral);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 30px var(--zen-coral);
            }
            20%, 24%, 55% { 
                opacity: 0.3; 
                text-shadow: none;
            }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            z-index: 1;
        }

        /* Controles de música */
        .music-controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background-color: var(--zen-subtle);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            border: 1px solid var(--zen-subtle);
            z-index: 20;
            transition: all 0.2s ease;
        }

        .music-controls:hover {
            border-color: var(--zen-coral);
        }

        .volume-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            filter: brightness(0) invert(1);
        }

        [data-theme="dark"] .volume-icon {
            filter: brightness(0) invert(1);
        }

        .volume-icon:hover {
            filter: brightness(0) invert(0.8) sepia(1) hue-rotate(200deg);
            transform: scale(1.1);
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .music-info img {
            width: 18px;
            height: 18px;
            filter: brightness(0) invert(1);
        }

        .music-info a {
            color: var(--zen-dark);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        [data-theme="dark"] .music-info a {
            color: var(--zen-paper);
        }

        .music-info a:hover {
            color: var(--zen-coral);
        }

        #bg-audio {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-paper font-['bricolage-grotesque'] text-dark">

    <!-- NAVEGAÇÃO SIMPLES -->
    <nav class="container relative z-20 flex w-full items-center justify-between bg-paper py-3 lg:py-6">
        <a class="flex items-center gap-2 text-lg font-bold" href="/">
            <img src="/Public/IMG/studio-logo-without.png" width="50" height="50" alt="Logo">
            <span>LIGHT</span>
        </a>
        
        <div class="flex items-center gap-4">
            <a href="https://lukzxdd.itch.io/" target="_blank" class="flex items-center justify-center gap-2 rounded-xl bg-dark px-6 py-3 text-paper shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-transform">
                Itch.io <img src="/Public/IMG/asset 12.svg" width="20" alt="">
            </a>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container flex-1">
        <div class="error-container">
            <h1 class="code-404">404</h1>
            <p class="message-404">You are lost in the dark</p>
            <a href="/" class="back-home">Return to Light</a>
        </div>
    </main>

    <!-- VIGNETTE EFFECT -->
    <div class="vignette"></div>

    <!-- CONTROLES DE MÚSICA -->
    <div class="music-controls">
        <img src="https://img.icons8.com/sf-black-filled/64/sound-speaker.png" alt="Volume" id="volumeIcon" class="volume-icon">
        <div class="music-info">
            <img src="/Public/IMG/m.png" alt="Music">
            <a href="https://youtube.com/playlist?list=PLstaXaIuDSEidUQAif2ptoqswAv8qTJ6y" target="_blank" id="musicName">
                The Last Choice - LIGHT OST
            </a>
        </div>
    </div>

    <audio id="bg-audio"></audio>

    <footer class="bg-dark text-paper py-8 mt-12 border-t border-dark">
        <div class="container text-center opacity-50 text-sm">
            2026 © LIGHT by Lukzxdd. All rights reserved.
        </div>
    </footer>

    <script>
        window.addEventListener('load', function() {
            const audio = document.getElementById('bg-audio');
            const volumeIcon = document.getElementById('volumeIcon');
            const musicName = document.getElementById('musicName');
            
            const musicas = [
                { src: '/Public/MP3/4042.mp3', nome: 'The True Light - LIGHT OST' },
                { src: '/Public/MP3/404.mp3', nome: 'The Last Choice - LIGHT OST' }
            ];
            
            let musicaAtual = 0;
            let isMuted = true;
            let audioIniciado = false;
            
            audio.src = musicas[musicaAtual].src;
            audio.volume = 0.3;
            audio.muted = true;
            musicName.textContent = musicas[musicaAtual].nome;
            
            audio.addEventListener('ended', function() {
                musicaAtual = (musicaAtual + 1) % musicas.length;
                audio.src = musicas[musicaAtual].src;
                musicName.textContent = musicas[musicaAtual].nome;
                if (!isMuted) {
                    audio.play();
                }
            });

            volumeIcon.addEventListener('click', function(e) {
                e.stopPropagation();
                
                if (!audioIniciado) {
                    audio.muted = false;
                    audio.play();
                    volumeIcon.src = "https://img.icons8.com/sf-black-filled/64/medium-volume.png";
                    audioIniciado = true;
                    isMuted = false;
                } else {
                    if (isMuted) {
                        audio.muted = false;
                        audio.play();
                        volumeIcon.src = "https://img.icons8.com/sf-black-filled/64/medium-volume.png";
                        isMuted = false;
                    } else {
                        audio.muted = true;
                        volumeIcon.src = "https://img.icons8.com/sf-black-filled/64/sound-speaker.png";
                        isMuted = true;
                    }
                }
            });
        });
    </script>
</body>
</html>
