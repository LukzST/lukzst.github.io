<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in the Dark</title>
    <link rel="shortcut icon" href="./Public/ICO/favicon.ico" type="image/x-icon">
    <style>
        :root {
    --primary-color: #f5f1b9;
    --secondary-color: #2f00ff;
    --bg-color: #030305;
}

@font-face {
    font-family: 'boldfont';
    src: url(./Public/FONTs/BebasNeue-Bold.ttf);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-color);
    color: #fff;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'boldfont', sans-serif;
}

.scanlines {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
    background-size: 100% 3px, 3px 100%;
    pointer-events: none;
    z-index: 1;
}

.vignette {
    position: absolute;
    width: 100%;
    height: 100%;
    box-shadow: inset 0 0 150px #000;
    pointer-events: none;
    z-index: 2;
}

.container {
    text-align: center;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.error-code {
    font-size: clamp(8rem, 25vw, 18rem);
    color: var(--primary-color);
    line-height: 0.8;
    letter-spacing: -5px;
    animation: flicker 4s linear infinite;
}

.message {
    font-size: clamp(1rem, 4vw, 1.5rem);
    letter-spacing: 8px;
    color: #666;
    margin-top: 15px;
    text-transform: uppercase;
}

.btn-back {
    margin-top: 50px;
    display: inline-block;
    text-decoration: none;
    color: var(--primary-color);
    border: 2px solid var(--primary-color);
    padding: 12px 40px;
    font-size: 1.2rem;
    letter-spacing: 3px;
    transition: 0.3s ease;
    background: transparent;
}

.btn-back:hover {
    background-color: var(--secondary-color);
    border-color: var(--secondary-color);
    color: #fff;
    box-shadow: 0 0 25px var(--secondary-color);
    transform: translateY(-5px);
}

@keyframes flicker {
    0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% {
        opacity: 1;
        text-shadow: 0 0 15px rgba(245, 241, 185, 0.4);
    }
    20%, 21.9%, 63%, 63.9%, 65%, 69.9% {
        opacity: 0.4;
        text-shadow: none;
    }
}

@media (max-width: 480px) {
    .error-code {
        letter-spacing: -2px;
    }
    .message {
        letter-spacing: 4px;
    }
    .btn-back {
        padding: 10px 25px;
        font-size: 1rem;
    }
}
    </style>
</head>
<body>
    <div class="vignette"></div>

    <div class="error-container">
        <h1 class="code-404">404</h1>
        <p class="message">You are lost in the dark</p>
        <a href="index.html" class="back-home">Return to Light</a>
    </div>

</body>
</html>
