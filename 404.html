<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in the Dark</title>
    <link rel="shortcut icon" href="./Public/ICO/favicon.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #f5f1b9;
            --secondary-color: #2f00ff;
            --background-color: #030305;
            --text-color: #ffffff;
        }

        @font-face {
            font-family: 'boldfont';
            src: url(./Public/FONTs/BebasNeue-Bold.ttf);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            font-family: sans-serif;
            text-align: center;
        }

        .error-container {
            position: relative;
        }
        .code-404 {
            font-family: 'boldfont', sans-serif;
            font-size: clamp(8rem, 25vw, 15rem);
            color: var(--primary-color);
            line-height: 1;
            letter-spacing: -5px;
            animation: flicker 3s infinite;
            text-shadow: 0 0 20px rgba(245, 241, 185, 0.3);
        }

        .message {
            font-family: 'boldfont', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-top: -10px;
            margin-bottom: 40px;
            color: var(--text-color);
            opacity: 0.8;
            text-transform: uppercase;
        }

        .back-home {
            margin-top: 50px;
            text-decoration: none;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 12px 30px;
            font-family: 'boldfont', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .back-home:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
            box-shadow: 0 0 30px var(--secondary-color);
            transform: scale(1.1);
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 20px var(--primary-color); }
            20%, 24%, 55% { opacity: 0.3; text-shadow: none; }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>

    <div class="error-container">
        <h1 class="code-404">404</h1>
        <p class="message">You are lost in the dark</p>
        <a href="index.html" class="back-home">Return to Light</a>
    </div>

</body>
</html>
