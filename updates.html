<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>LIGHT | Updates</title>
    <link rel="shortcut icon" href="./Public/ICO/favicon.ico" type="image/x-icon">
    
    <style>
        :root {
    --primary-color: #f5f1b9;
    --second-color: 'white';
    --secondary-color: #2f00ff;
    --background-color: #030305;
    --background-color-2: #0e0e18;
    --background-color-3: #1a1a2e;
    --background-color-4: #06060e;
    --text-color: #ffffff;
    --text-color-2: gray;
    --spacing-sm: 0.5rem;
    --spacing-md: 1rem;
    --spacing-lg: 2rem;
    --transition-speed: 0.3s;
}

@font-face {
    font-family: 'lightFont-textNormal';
    src: url(./Public/FONTs/lightFontNormal.ttf);
}
@font-face {
    font-family: 'boldfont';
    src: url(./Public/FONTs/BebasNeue-Bold.ttf);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'lightFont-textNormal', sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: var(--background-color);
    color: var(--text-color);
    overflow-x: hidden;
}

.header_web {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    position: fixed;
    z-index: 1000;
    height: 80px;
    box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.7);
    padding: 0 20px;
    background-color: var(--background-color);
}

.logo {
    width: 50px;
    height: auto;
    display: block;
}

.navegationHeader {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 30px;
    flex-grow: 1;
    justify-content: flex-start;
}

.text_header {
    font-size: 1.4rem;
    color: var(--text-color-2);
    text-decoration: none;
    transition: all 0.3s ease;
    display: inline-block;
}

.text_header:hover {
    color: var(--primary-color);
    transform: scale(1.2);
}

.socialMedia {
    display: flex;
    align-items: center;
    gap: 20px;
    justify-content: flex-end;
}

.socialMedia img {
    width: 30px;
    transition: all 0.3s ease;
}

.updates-container {
    padding: 120px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.title-updates {
    font-family: 'boldfont';
    font-size: 4rem;
    color: var(--primary-color);
    margin-bottom: 10px;
    text-align: center;
}

.subtitle {
    font-size: 1.2rem;
    color: var(--text-color-2);
    margin-bottom: 50px;
}

.version-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    width: 100%;
    max-width: 1200px;
}

.version-card {
    background-color: var(--background-color);
    border: 2px solid var(--primary-color);
    padding: 30px;
    border-radius: 10px;
    text-decoration: none;
    color: var(--text-color);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.version-card:hover {
    border-color: var(--secondary-color);
    transform: scale(1.05);
    background-color: var(--background-color-4);
}

.version-card h2 {
    font-family: 'boldfont';
    font-size: 2.5rem;
    color: var(--primary-color);
}

.version-card p {
    font-size: 1.3rem;
    color: var(--text-color-2);
    line-height: 1.4;
}

.loader {
    border: 4px solid var(--background-color-3);
    border-top: 4px solid var(--primary-color);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

#current-date {
    color: var(--primary-color);
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.footer {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background-color: var(--background-color-2);
    transition: all 0.3s ease;
}

@media (max-width: 768px) {
    .header_web { height: auto; padding: 1rem; }
    .navegationHeader { display: none; }
    .title-updates { font-size: 2.5rem; }
    .version-grid { grid-template-columns: 1fr; }
    .footer {
        padding: 20px;
        flex-direction: column;
        text-align: center;
        font-size: 0.6rem;
        gap: 10px;
    }
}
    </style>
</head>
<body>

    <header class="header_web">
        <nav class="navegationHeader">
            <a href="index.html" class="logo_header">
                <img src="./Public/IMG/light_logo_2.png" class="logo" alt="Logo">
            </a>
        </nav>

        <div class="socialMedia">
            <a href="https://github.com/LukzST" target="_blank">
                <img src="./Public/IMG/github.png" alt="Github">
            </a>
            <a href="https://lukzxdd.itch.io/" target="_blank">
                <img src="./Public/IMG/itch.png" alt="Itch">
            </a>
        </div>
    </header>

    <main class="updates-container">
        <h1 class="title-updates">RELEASES & VERSIONS</h1>
        <p class="subtitle">All versions of LIGHT released up to <span id="current-date"></span></p>

        <div id="version-container" class="version-grid">
            <div class="loader"></div>
        </div>
    </main>

    <footer class="footer">
        <h1>2026 © LIGHT by Lukzxdd. All rights reserved.</h1>
    </footer>

    <script>

        
    function setCurrentDate() {
        const dateElement = document.getElementById('current-date');
        const today = new Date();
        
        const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
        dateElement.innerText = today.toLocaleDateString('pt-BR', options);
    }

    window.addEventListener('DOMContentLoaded', () => {
        setCurrentDate();
        fetchVersions();
    });

        const repoOwner = 'lukzst';
        const repoName = 'light';
        const targetPath = 'FINAL';

        async function fetchVersions() {
            const container = document.getElementById('version-container');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${targetPath}`);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                container.innerHTML = '';

                const folders = data.filter(item => item.type === 'dir' && item.name !== 'BETA_V1.0');

                folders.forEach(folder => {
                    const card = document.createElement('a');
                    card.href = `https://github.com/${repoOwner}/${repoName}/tree/main/${targetPath}/${folder.name}`;
                    card.target = "_blank";
                    card.className = 'version-card';
                    
                    card.innerHTML = `
                        <h2>${folder.name.toUpperCase()}</h2>
                        <p>Final build located in the repository. Click to access the files for this version.</p>
                        <span style="color: var(--primary-color); font-weight: bold;">EXPLORE →</span>
                    `;
                    
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = '<p class="about-text">Erro ao carregar versões ou pasta vazia.</p>';
            }
        }

        window.onload = fetchVersions;
    </script>
</body>
</html>
